app:
  environment: local
  log_level: INFO
  log_format: json

runtime:
  default_mode: simulate
  max_cycles: 1
  cycle_interval_seconds: 1

exchange:
  name: kraken
  base_currency: USD
  supplementary_exchanges:
    - binance
    - coinbase

data:
  raw_kraken_dir: data/kraken_data
  canonical_dir: data/canonical
  reports_dir: artifacts/reports/data
  intervals:
    - 1h
    - 1d

strategy:
  fixed_universe:
    - BTC
    - ETH
    - BNB
    - XRP
    - SOL
    - ADA
    - DOGE
    - TRX
    - AVAX
    - LINK
  min_source_confidence: 0.8
  entry_momentum_floor: 0.0
  entry_trend_gap_floor: 0.0
  hold_momentum_floor: -0.03
  hold_trend_gap_floor: -0.03
  max_realized_volatility: 0.25
  reduction_volatility_threshold: 0.12
  severe_momentum_floor: -0.08
  severe_trend_gap_floor: -0.05
  weak_relative_strength_floor: -0.03
  reduction_target_fraction: 0.5
  held_asset_score_bonus: 0.02
  drawdown_caution_threshold: 0.10
  drawdown_reduced_threshold: 0.20
  drawdown_catastrophe_threshold: 0.30
  elevated_caution_exposure_multiplier: 0.8
  reduced_aggressiveness_exposure_multiplier: 0.6
  catastrophe_exposure_multiplier: 0.3

research:
  primary_interval: 1d
  momentum_windows_days: [7, 30, 90]
  trend_windows_days: [50, 200]
  volatility_windows_days: [20, 60]
  relative_strength_window_days: 30
  breadth_window_days: 30
  dollar_volume_window_days: 20
  source_window_days: 30
  forward_return_days: 5
  downside_lookahead_days: 10
  downside_threshold: 0.08
  sell_lookahead_days: 20
  sell_drawdown_threshold: 0.12
  sell_return_threshold: -0.02

backtest:
  initial_cash_usd: 100000.0
  fee_rate_bps: 26.0
  slippage_bps: 10.0
  max_positions: 5
  max_asset_weight: 0.35
  min_order_notional_usd: 25.0
  rebalance_threshold: 0.02
  quantity_precision: 8
  constructive_exposure: 1.0
  neutral_exposure: 0.5
  defensive_exposure: 0.25

alerts:
  email_recipient: null

paths:
  data_dir: data
  artifacts_dir: artifacts
  features_dir: artifacts/features
  experiments_dir: artifacts/experiments
  logs_dir: runtime/logs
  state_dir: runtime/state
