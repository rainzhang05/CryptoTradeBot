app:
  environment: local
  log_level: INFO
  log_format: json

runtime:
  default_mode: simulate
  max_cycles: 1
  cycle_interval_seconds: 1

exchange:
  name: kraken
  base_currency: USD
  supplementary_exchanges:
    - binance
    - coinbase

data:
  raw_kraken_dir: data/kraken_data
  canonical_dir: data/canonical
  reports_dir: artifacts/reports/data
  intervals:
    - 1h
    - 1d

strategy:
  fixed_universe:
    - BTC
    - ETH
    - BNB
    - XRP
    - SOL
    - ADA
    - DOGE
    - TRX
    - AVAX
    - LINK

research:
  primary_interval: 1d
  momentum_windows_days: [7, 30, 90]
  trend_windows_days: [50, 200]
  volatility_windows_days: [20, 60]
  relative_strength_window_days: 30
  breadth_window_days: 30
  dollar_volume_window_days: 20
  source_window_days: 30
  forward_return_days: 5
  downside_lookahead_days: 10
  downside_threshold: 0.08
  sell_lookahead_days: 20
  sell_drawdown_threshold: 0.12
  sell_return_threshold: -0.02

alerts:
  email_recipient: null

paths:
  data_dir: data
  artifacts_dir: artifacts
  features_dir: artifacts/features
  experiments_dir: artifacts/experiments
  logs_dir: runtime/logs
  state_dir: runtime/state
