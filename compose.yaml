services:
  cryptotradebot:
    build:
      context: .
    image: cryptotradebot:local
    environment:
      CRYPTOTRADEBOT_CONFIG_PATH: ${CRYPTOTRADEBOT_CONFIG_PATH:-config/settings.yaml}
      CRYPTOTRADEBOT_HOME: ${CRYPTOTRADEBOT_HOME:-/app}
      KRAKEN_API_KEY: ${KRAKEN_API_KEY:-}
      KRAKEN_API_SECRET: ${KRAKEN_API_SECRET:-}
      KRAKEN_API_OTP: ${KRAKEN_API_OTP:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    command: ["setup"]
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./runtime:/app/runtime
