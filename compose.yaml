services:
  tradebot:
    build:
      context: .
    image: crypto-spot-trading-bot:local
    environment:
      BOT_CONFIG_PATH: ${BOT_CONFIG_PATH:-config/settings.yaml}
      KRAKEN_API_KEY: ${KRAKEN_API_KEY:-}
      KRAKEN_API_SECRET: ${KRAKEN_API_SECRET:-}
      KRAKEN_API_OTP: ${KRAKEN_API_OTP:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    command: ["doctor"]
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./runtime:/app/runtime
