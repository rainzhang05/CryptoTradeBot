name: Package Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  install-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Prepare Python environment
        uses: ./.github/actions/setup-python-dev

      - name: Build distribution packages
        run: .venv/bin/python -m build

      - name: Validate global-install smoke workflow
        run: |
          rm -rf .ci-install-home .ci-install-venv
          python -m venv .ci-install-venv
          .ci-install-venv/bin/python -m pip install dist/*.whl
          .ci-install-venv/bin/python - <<'PY'
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          ansi_escape_re = re.compile(r"\x1b\[[0-9;]*[A-Za-z]")


          def plain_text(value: str) -> str:
            return ansi_escape_re.sub("", value)

          root = Path.cwd()
          home = root / ".ci-install-home"
          script = root / ".ci-install-venv" / "bin" / "tradebot"
          if sys.platform == "win32":
            script = script.with_suffix(".exe")

          env = os.environ.copy()
          env["TRADEBOT_HOME"] = str(home)

          help_result = subprocess.run(
            [str(script), "--help"],
            cwd=root,
            env=env,
            capture_output=True,
            text=True,
            check=False,
          )
          assert help_result.returncode == 0, help_result.stderr

          validate_result = subprocess.run(
            [str(script), "config", "validate"],
            cwd=root,
            env=env,
            capture_output=True,
            text=True,
            check=False,
          )
          assert validate_result.returncode == 0, validate_result.stderr
          assert (home / "config" / "settings.yaml").exists()
          assert (home / ".env").exists()

          no_arg_result = subprocess.run(
            [str(script)],
            cwd=root,
            env=env,
            stdin=subprocess.DEVNULL,
            capture_output=True,
            text=True,
            check=False,
          )
          assert no_arg_result.returncode == 0, no_arg_result.stderr
          assert "Usage: tradebot" in plain_text(no_arg_result.stdout)
          PY

  runtime-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Prepare Python environment
        uses: ./.github/actions/setup-python-dev

      - name: Validate release-readiness workflow
        run: .venv/bin/pytest --no-cov tests/integration/test_release_readiness.py

      - name: Validate live runtime safety workflow
        run: .venv/bin/pytest --no-cov tests/unit/execution/test_service.py tests/unit/test_runtime.py tests/integration/test_cli_basics.py -k live

  operator-scenario:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Prepare Python environment
        uses: ./.github/actions/setup-python-dev

      - name: Validate research, model, backtest, and simulation workflow
        run: |
          rm -rf .ci-release
          mkdir -p .ci-release/config
          cat > .ci-release/config/settings.yaml <<'YAML'
          app:
            environment: ci
            log_format: console
          runtime:
            default_mode: simulate
            max_cycles: 1
          exchange: {}
          data:
            canonical_dir: data/canonical
          strategy:
            fixed_universe: [BTC, ETH, BNB, XRP, SOL, ADA, DOGE, TRX, AVAX, LINK]
          research:
            primary_interval: 1d
            momentum_windows_days: [2]
            trend_windows_days: [2, 4]
            volatility_windows_days: [2]
            relative_strength_window_days: 2
            breadth_window_days: 2
            dollar_volume_window_days: 2
            source_window_days: 2
            forward_return_days: 1
            downside_lookahead_days: 2
            downside_threshold: 0.05
            sell_lookahead_days: 3
            sell_drawdown_threshold: 0.08
            sell_return_threshold: -0.01
          model:
            initial_train_timestamps: 2
            minimum_validation_rows: 1
            minimum_walk_forward_splits: 1
            promotion_min_expected_return_correlation: -1.0
            promotion_max_downside_brier: 1.0
            promotion_max_sell_brier: 1.0
          backtest:
            initial_cash_usd: 1000.0
            fee_rate_bps: 0.0
            slippage_bps: 0.0
            max_positions: 2
            max_asset_weight: 0.35
            min_order_notional_usd: 10.0
          alerts: {}
          paths: {}
          YAML
          BOT_CONFIG_PATH="$PWD/.ci-release/config/settings.yaml" .venv/bin/python - <<'PY'
          from pathlib import Path
          from tradebot.data.models import Candle
          from tradebot.data.storage import write_candles

          root = Path(".ci-release")
          start_timestamp = 1_704_067_200
          series = {
              "BTC": ([100, 101, 103, 106, 108, 111, 114, 118, 121, 125, 128, 132],
                      [99, 100, 102, 105, 107, 110, 113, 117, 120, 124, 127, 131]),
              "ETH": ([50, 51, 52, 53, 55, 58, 60, 63, 65, 68, 70, 73],
                      [49, 50, 51, 52, 54, 57, 59, 62, 64, 67, 69, 72]),
          }

          for asset, (closes, lows) in series.items():
              path = root / "data" / "canonical" / "kraken" / asset / "candles_1d.csv"
              candles = [
                  Candle(
                      timestamp=start_timestamp + index * 86_400,
                      open=close - 0.5,
                      high=close + 1.0,
                      low=lows[index],
                      close=close,
                      volume=1_000 + index * 10,
                      trade_count=100 + index,
                      source="kraken_api",
                  )
                  for index, close in enumerate(closes)
              ]
              write_candles(path, candles)
          PY
          BOT_CONFIG_PATH="$PWD/.ci-release/config/settings.yaml" .venv/bin/tradebot model train --assets BTC --assets ETH
          BOT_CONFIG_PATH="$PWD/.ci-release/config/settings.yaml" .venv/bin/tradebot model validate
          BOT_CONFIG_PATH="$PWD/.ci-release/config/settings.yaml" .venv/bin/tradebot model promote
          BOT_CONFIG_PATH="$PWD/.ci-release/config/settings.yaml" .venv/bin/tradebot backtest run --assets BTC --assets ETH
          BOT_CONFIG_PATH="$PWD/.ci-release/config/settings.yaml" .venv/bin/tradebot backtest report
          BOT_CONFIG_PATH="$PWD/.ci-release/config/settings.yaml" .venv/bin/tradebot run --mode simulate --max-cycles 1

      - name: Validate operator CLI workflow
        run: |
          BOT_CONFIG_PATH="$PWD/.ci-release/config/settings.yaml" .venv/bin/tradebot status
          BOT_CONFIG_PATH="$PWD/.ci-release/config/settings.yaml" .venv/bin/tradebot report list
          BOT_CONFIG_PATH="$PWD/.ci-release/config/settings.yaml" .venv/bin/tradebot report export artifacts/reports/models/latest_training_summary.json .ci-release/exports/latest_training_summary.json
          BOT_CONFIG_PATH="$PWD/.ci-release/config/settings.yaml" .venv/bin/tradebot email set trader@example.com
          BOT_CONFIG_PATH="$PWD/.ci-release/config/settings.yaml" .venv/bin/tradebot logs tail --lines 1
          test -f .ci-release/exports/latest_training_summary.json
          grep -q "trader@example.com" .ci-release/config/settings.yaml