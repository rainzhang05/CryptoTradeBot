name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.15"

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Lint
        run: uv run --python 3.12 ruff check .

      - name: Type-check
        run: uv run --python 3.12 mypy src

      - name: Test with coverage
        run: uv run --python 3.12 pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Build Docker image
        run: docker build -t crypto-spot-trading-bot:ci .

      - name: Docker smoke test
        run: |
          rm -rf .ci-smoke
          mkdir -p .ci-smoke/data/kraken_data .ci-smoke/artifacts
          cp tests/fixtures/raw/kraken/XBTUSD.csv .ci-smoke/data/kraken_data/XBTUSD.csv
          cp tests/fixtures/raw/kraken/ETHUSD.csv .ci-smoke/data/kraken_data/ETHUSD.csv
          docker run --rm crypto-spot-trading-bot:ci doctor
          docker run --rm crypto-spot-trading-bot:ci run --mode simulate --max-cycles 1
          docker run --rm \
            -v "$PWD/.ci-smoke/data:/app/data" \
            -v "$PWD/.ci-smoke/artifacts:/app/artifacts" \
            crypto-spot-trading-bot:ci data import --assets BTC --assets ETH
          docker run --rm \
            -v "$PWD/.ci-smoke/data:/app/data" \
            -v "$PWD/.ci-smoke/artifacts:/app/artifacts" \
            crypto-spot-trading-bot:ci features build --assets BTC --assets ETH